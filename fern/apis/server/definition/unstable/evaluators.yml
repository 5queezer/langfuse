# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  commons: ./commons.yml
  errors: ./errors.yml
  pagination: ../utils/pagination.yml

service:
  auth: true
  base-path: /api/public/unstable
  endpoints:
    create:
      docs: |
        Create a project-owned evaluator version.

        Evaluators are backed directly by versioned `EvalTemplate` rows.
        The returned `id` is the identifier of one exact immutable evaluator version.

        Create semantics:
        - if the authenticated project has no evaluator family with this `name`, Langfuse creates version `1`
        - if the authenticated project already has an evaluator family with this `name`, Langfuse creates the next version in that family
        - Langfuse-managed evaluators with the same name do **not** affect project version numbering

        Recommended workflow:
        1. Create or version the evaluator.
        2. Read the returned `variables` array.
        3. Create one or more continuous evaluations that reference the returned `id`.

        Unstable API note:
        - This surface may evolve while the underlying evaluation data model is being redesigned.
      method: POST
      path: /evaluators
      request: CreateEvaluatorRequest
      response: Evaluator
      errors:
        - errors.BadRequestError
        - errors.UnauthorizedError
        - errors.AccessDeniedError
        - errors.MethodNotAllowedError
        - errors.ConflictError
        - errors.UnprocessableContentError
        - errors.TooManyRequestsError
        - errors.InternalServerError
      examples:
        - name: CreateEvaluatorVersion
          docs: Create version 2 of an existing project-owned evaluator family named `answer-correctness`.
          request:
            name: answer-correctness
            prompt: |
              You are grading an answer.

              Input:
              {{input}}

              Output:
              {{output}}

              Return a score between 0 and 1.
            outputDefinition:
              version: 1
              dataType: NUMERIC
              reasoning:
                description: Explain why the score was assigned.
              score:
                description: Correctness score between 0 and 1.
            modelConfig:
              provider: openai
              model: gpt-4.1-mini
              modelParams:
                temperature: 0
          response:
            body:
              id: evaltmpl_123
              name: answer-correctness
              version: 2
              scope: project
              type: llm_as_judge
              prompt: |
                You are grading an answer.

                Input:
                {{input}}

                Output:
                {{output}}

                Return a score between 0 and 1.
              variables:
                - input
                - output
              outputDefinition:
                version: 1
                dataType: NUMERIC
                reasoning:
                  description: Explain why the score was assigned.
                score:
                  description: Correctness score between 0 and 1.
              modelConfig:
                provider: openai
                model: gpt-4.1-mini
                modelParams:
                  temperature: 0
              continuousEvaluationCount: 0
              createdAt: "2026-03-30T09:00:00.000Z"
              updatedAt: "2026-03-30T09:00:00.000Z"

    list:
      docs: |
        List the latest evaluator version per family that is visible to the authenticated project.

        Visibility rules:
        - project-owned evaluator families where `projectId` matches the authenticated project
        - Langfuse-managed evaluator families where `projectId` is `null`

        Important behavior:
        - this endpoint returns only the latest version per family
        - the returned `id` is still an exact evaluator version identifier
        - a project-owned family and a managed family with the same `name` are returned as separate items with different `scope` values
      method: GET
      path: /evaluators
      request:
        name: ListEvaluatorsRequest
        query-parameters:
          page:
            type: optional<integer>
            docs: 1-based page number. Defaults to `1`.
          limit:
            type: optional<integer>
            docs: Maximum number of items per page. Defaults to `50`.
      response: Evaluators
      errors:
        - errors.BadRequestError
        - errors.UnauthorizedError
        - errors.AccessDeniedError
        - errors.MethodNotAllowedError
        - errors.TooManyRequestsError
        - errors.InternalServerError

    get:
      docs: |
        Get one exact evaluator version by `id`.

        Use this endpoint when you want the precise prompt, output definition, model configuration, and derived variables for a single evaluator version before referencing it from a continuous evaluation.
      method: GET
      path: /evaluators/{evaluatorId}
      path-parameters:
        evaluatorId:
          type: string
          docs: Exact evaluator version identifier returned by the evaluator endpoints.
      response: Evaluator
      errors:
        - errors.BadRequestError
        - errors.UnauthorizedError
        - errors.AccessDeniedError
        - errors.NotFoundError
        - errors.MethodNotAllowedError
        - errors.TooManyRequestsError
        - errors.InternalServerError

types:
  Evaluator:
    docs: |
      One exact immutable evaluator version.

      An evaluator describes **how** to score data:
      - prompt
      - extracted prompt variables
      - output schema
      - optional explicit model configuration

      It does not define **which** live objects are evaluated. That is the job of `continuous-evaluations`.
    properties:
      id:
        type: string
        docs: Exact evaluator version identifier.
      name:
        type: string
        docs: Evaluator family name within its scope.
      version:
        type: integer
        docs: Version number within the evaluator family.
      scope:
        type: commons.EvaluatorScope
        docs: Whether this evaluator belongs to the authenticated project or is Langfuse-managed.
      type:
        type: commons.EvaluatorType
        docs: Evaluator engine type. Currently always `llm_as_judge`.
      prompt:
        type: string
        docs: Prompt template used during evaluation.
      variables:
        type: list<string>
        docs: |
          Variables extracted from the evaluator prompt.

          Every variable in this list must be mapped exactly once when creating a continuous evaluation.
      outputDefinition:
        type: unknown
        docs: Structured output schema that the evaluator must return.
      modelConfig:
        type: nullable<commons.EvaluatorModelConfig>
        docs: Explicit model configuration, or `null` when the project default evaluation model is used.
      continuousEvaluationCount:
        type: integer
        docs: Number of continuous evaluations in the project that currently reference this exact evaluator version.
      createdAt:
        type: datetime
        docs: Timestamp when this exact evaluator version was created.
      updatedAt:
        type: datetime
        docs: Timestamp when this exact evaluator version was last updated.

  Evaluators:
    properties:
      data:
        type: list<Evaluator>
      meta:
        type: pagination.MetaResponse

  CreateEvaluatorRequest:
    docs: |
      Create a project-owned evaluator version.

      Important behavior:
      - `name` controls project-local versioning
      - repeating the same `name` creates the next project-owned version
      - managed evaluators with the same `name` do not affect version numbering
    properties:
      name:
        type: string
        docs: Evaluator family name within the authenticated project.
      prompt:
        type: string
        docs: Prompt template for the evaluator.
      outputDefinition:
        type: unknown
        docs: Structured output schema that the evaluator must return.
      modelConfig:
        type: optional<nullable<commons.EvaluatorModelConfig>>
        docs: Optional explicit model configuration. Omit or set to `null` to use the project default evaluation model.
