# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  commons: ./commons.yml
  pagination: ../utils/pagination.yml

service:
  auth: true
  base-path: /api/public/unstable
  endpoints:
    create:
      docs: |
        Create a continuous evaluation on the unstable public API.

        Continuous evaluations define which observations or experiments should be evaluated during live ingestion.
      method: POST
      path: /continuous-evaluations
      request: CreateContinuousEvaluationRequest
      response: ContinuousEvaluation

    list:
      docs: List continuous evaluations on the unstable public API.
      method: GET
      path: /continuous-evaluations
      request:
        name: ListContinuousEvaluationsRequest
        query-parameters:
          page:
            type: optional<integer>
            docs: Page number, starts at 1.
          limit:
            type: optional<integer>
            docs: Limit of items per page.
      response: ContinuousEvaluations

    get:
      docs: Get a continuous evaluation on the unstable public API.
      method: GET
      path: /continuous-evaluations/{continuousEvaluationId}
      path-parameters:
        continuousEvaluationId:
          type: string
          docs: Continuous evaluation identifier.
      response: ContinuousEvaluation

    update:
      docs: Update a continuous evaluation on the unstable public API.
      method: PATCH
      path: /continuous-evaluations/{continuousEvaluationId}
      path-parameters:
        continuousEvaluationId:
          type: string
          docs: Continuous evaluation identifier.
      request: UpdateContinuousEvaluationRequest
      response: ContinuousEvaluation

    delete:
      docs: Delete a continuous evaluation on the unstable public API.
      method: DELETE
      path: /continuous-evaluations/{continuousEvaluationId}
      path-parameters:
        continuousEvaluationId:
          type: string
          docs: Continuous evaluation identifier.
      response: DeleteContinuousEvaluationResponse

types:
  ContinuousEvaluation:
    properties:
      id: string
      name: string
      evaluatorId: string
      target: commons.ContinuousEvaluationTarget
      enabled: boolean
      status: commons.ContinuousEvaluationStatus
      pausedReason: nullable<string>
      pausedMessage: nullable<string>
      sampling: double
      filter: list<map<string, unknown>>
      mapping: list<commons.ContinuousEvaluationMapping>
      createdAt: datetime
      updatedAt: datetime

  ContinuousEvaluations:
    properties:
      data: list<ContinuousEvaluation>
      meta: pagination.MetaResponse

  CreateContinuousEvaluationRequest:
    properties:
      name: string
      evaluatorId: string
      target: commons.ContinuousEvaluationTarget
      enabled: boolean
      sampling: optional<double>
      filter: optional<list<map<string, unknown>>>
      mapping: list<commons.ContinuousEvaluationMapping>

  UpdateContinuousEvaluationRequest:
    properties:
      name: optional<string>
      evaluatorId: optional<string>
      target: optional<commons.ContinuousEvaluationTarget>
      enabled: optional<boolean>
      sampling: optional<double>
      filter: optional<list<map<string, unknown>>>
      mapping: optional<list<commons.ContinuousEvaluationMapping>>

  DeleteContinuousEvaluationResponse:
    properties:
      message: string
